<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Seite nicht gefunden | HK Bau</title>
    <meta name="robots" content="noindex, follow">
    <link rel="icon" type="image/png" href="favicon-96x96.png" sizes="96x96" />
    <link rel="stylesheet" href="css/tailwind.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <style>
        .error-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #2b2b2b 0%, #1a1a1a 100%);
        }
        .error-404 {
            font-size: 10rem;
            font-weight: 900;
            color: var(--primary-color);
            text-shadow: 0 5px 15px rgba(251, 187, 33, 0.3);
            line-height: 1;
        }
        @media (max-width: 768px) {
            .error-404 {
                font-size: 6rem;
            }
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="text-center px-6 max-w-2xl">
            <h1 class="error-404 mb-6">404</h1>
            <h2 class="text-3xl md:text-4xl font-bold text-white mb-4">
                Seite nicht gefunden
            </h2>
            <p class="text-gray-300 text-lg mb-8">
                Die von Ihnen gesuchte Seite existiert leider nicht oder wurde verschoben.
            </p>
            <div class="flex flex-col sm:flex-row gap-4 justify-center">
                <a href="index.html" 
                   class="inline-block bg-[var(--primary-color)] text-[var(--secondary-color)] font-bold px-8 py-4 rounded-lg shadow-lg hover:bg-[var(--primary-hover)] hover:scale-105 transition-all">
                    <i class="fas fa-home mr-2"></i>
                    Zur Startseite
                </a>
                <a href="kontakt.html" 
                   class="inline-block bg-white text-[var(--secondary-color)] font-bold px-8 py-4 rounded-lg shadow-lg hover:bg-gray-100 hover:scale-105 transition-all">
                    <i class="fas fa-envelope mr-2"></i>
                    Kontakt
                </a>
            </div>
            <div class="mt-12 pt-8 border-t border-gray-700">
                <p class="text-gray-400 text-sm mb-4">Suchen Sie nach:</p>
                <div class="flex flex-wrap justify-center gap-3">
                    <a href="leistungen.html" class="text-[var(--primary-color)] hover:underline">
                        <i class="fas fa-wrench mr-1"></i> Leistungen
                    </a>
                    <span class="text-gray-600">|</span>
                    <a href="referenzen.html" class="text-[var(--primary-color)] hover:underline">
                        <i class="fas fa-images mr-1"></i> Referenzen
                    </a>
                    <span class="text-gray-600">|</span>
                    <a href="karriere.html" class="text-[var(--primary-color)] hover:underline">
                        <i class="fas fa-briefcase mr-1"></i> Karriere
                    </a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
